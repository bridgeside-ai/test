# E2E Smoke Tests for bridgeside.ai marketing pages
name: E2E Smoke Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend base URL (e.g. https://test.bridgeside.dev)'
        required: false
        default: 'https://test.bridgeside.dev'

jobs:
  smoke-tests:
    name: Marketing Pages Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package.json'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run Playwright smoke tests
        run: npm test -- --project=chromium
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://test.bridgeside.dev' }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7