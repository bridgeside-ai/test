name: E2E Smoke Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Frontend base URL (e.g. https://test.bridgeside.dev)'
        required: false
        default: 'https://test.bridgeside.dev'

jobs:
  smoke-tests:
    name: Marketing Pages Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests
        run: npm test -- --project=chromium
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://test.bridgeside.dev' }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7